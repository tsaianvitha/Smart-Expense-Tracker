<!DOCTYPE html>
<html>
<head><title>Generate SpendSmart PWA Icons</title></head>
<body>
<p>Click the button — icons will auto-download. Save them to <code>frontend/public/icons/</code></p>
<button onclick="generateAll()">Generate & Download All Icons</button>
<div id="previews" style="display:flex;flex-wrap:wrap;gap:12px;margin-top:16px;"></div>

<script>
const SIZES = [72,96,128,144,152,192,384,512];

function drawIcon(size) {
  const canvas = document.createElement("canvas");
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext("2d");

  // Background
  ctx.fillStyle = "#1e1b4b";
  const r = size * 0.2;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // Coin circle
  const cx = size / 2, cy = size / 2;
  const coinR = size * 0.32;
  ctx.beginPath();
  ctx.arc(cx, cy, coinR, 0, Math.PI * 2);
  ctx.fillStyle = "#f59e0b";
  ctx.fill();

  // Dollar sign
  ctx.fillStyle = "#1e1b4b";
  ctx.font = `bold ${size * 0.38}px Arial`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("₹", cx, cy + size * 0.01);

  return canvas;
}

function generateAll() {
  const previews = document.getElementById("previews");
  previews.innerHTML = "";
  SIZES.forEach(size => {
    const canvas = drawIcon(size);
    previews.appendChild(canvas);
    canvas.toBlob(blob => {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `icon-${size}.png`;
      a.click();
    });
  });
}
</script>
</body>
</html>
